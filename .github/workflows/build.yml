name: Fast Build Firmware

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        env: [esp32, esp32s3, esp32c3]

    steps:
      # =========================
      # 1. 拉代码
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # 2. Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 3. ⭐ PlatformIO 缓存（核心加速）
      # =========================
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('**/platformio.ini') }}

      # =========================
      # 4. 安装 PlatformIO（只装，不装 platform）
      # =========================
      - name: Install PlatformIO
        run: pip install -U platformio

      # =========================
      # 5. 编译
      # =========================
      - name: Build firmware
        run: pio run -e ${{ matrix.env }}

      # =========================
      # 6. 生成时间戳 + 收集 bin
      # =========================
      - name: Collect firmware
        run: |
          mkdir -p bin

          TIME=$(TZ=Asia/Shanghai date +"%Y%m%d-%H%M%S")

          cp .pio/build/${{ matrix.env }}/firmware.bin \
             bin/firmware-${{ matrix.env }}-${TIME}.bin

          echo "TIME=$TIME" >> $GITHUB_ENV

      # =========================
      # 8. 自动 Tag（加速版优化点）
      # =========================
      - name: Create tag
        run: |
          TAG="build-${TIME}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $TAG
          git push origin $TAG

          echo "TAG=$TAG" >> $GITHUB_ENV

      # =========================
      # 9. Release 发布
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Firmware ${{ env.TAG }}
          files: bin/**/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
